<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1e3a5f"/>
  <!-- candlestick 1 (red/down) -->
  <line x1="14" y1="10" x2="14" y2="16" stroke="#ef5350" stroke-width="2"/>
  <rect x="10" y="16" width="8" height="14" rx="1" fill="#ef5350"/>
  <line x1="14" y1="30" x2="14" y2="36" stroke="#ef5350" stroke-width="2"/>
  <!-- candlestick 2 (green/up) -->
  <line x1="28" y1="18" x2="28" y2="24" stroke="#26a69a" stroke-width="2"/>
  <rect x="24" y="24" width="8" height="16" rx="1" fill="#26a69a"/>
  <line x1="28" y1="40" x2="28" y2="46" stroke="#26a69a" stroke-width="2"/>
  <!-- candlestick 3 (green/up tall) -->
  <line x1="42" y1="12" x2="42" y2="20" stroke="#26a69a" stroke-width="2"/>
  <rect x="38" y="20" width="8" height="20" rx="1" fill="#26a69a"/>
  <line x1="42" y1="40" x2="42" y2="50" stroke="#26a69a" stroke-width="2"/>
  <!-- FVG zone highlight (shaded box between candle 2 top and candle 1 bottom) -->
  <rect x="20" y="30" width="12" height="8" rx="1" fill="#f0c040" opacity="0.35"/>
  <!-- label text -->
  <text x="32" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f0c040" letter-spacing="1">FVG</text>
</svg>
